# 0- prefix ensures this runs first (highest priority)
name: 0-TypeScript

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typescript:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: |
          npm ci
          cd frontend && npm ci

      - name: TypeScript validation
        run: |
          echo "🔍 Running TypeScript validation..."
          cd frontend && npm run type-check
