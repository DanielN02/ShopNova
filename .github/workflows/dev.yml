name: Development CI

on:
  push:
    branches: [main]

jobs:
  # Quick tests on every push/PR
  quick-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json
            services/user-order-service/package-lock.json
            services/product-service/package-lock.json
            services/notification-service/package-lock.json

      - name: Install dependencies
        run: |
          npm install
          cd frontend && npm install
          cd ../services/user-order-service && npm install
          cd ../../services/product-service && npm install
          cd ../../services/notification-service && npm install

      - name: Lint check (if ESLint is configured)
        run: |
          echo "🔍 Running lint checks..."
          # Add lint commands if you configure ESLint
          # cd frontend && npm run lint
          echo "✅ No linting configured - skipping"

      - name: Type check
        run: |
          echo "🔍 Running TypeScript type checks..."
          cd frontend && npm run type-check
          echo "✅ Frontend type check passed"
          echo "⏭️ Skipping backend type checks (handled in full CI pipeline)"

      - name: Run frontend tests
        run: |
          echo "🧪 Running frontend tests..."
          cd frontend && npm test

      - name: Run backend tests (quick check)
        run: |
          echo "🧪 Running quick backend tests..."
          echo "⏭️ Skipping backend tests (handled in full CI pipeline with services)"

      - name: Test summary
        run: |
          echo "✅ All checks passed!"
          echo "📊 Frontend tests: Ready (Jest configured)"
          echo "📊 Backend tests: 55 tests (handled in full CI pipeline)"
