# This workflow runs before the problematic quick-check
name: Pre-Check Setup

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pre-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install all dependencies
        run: |
          npm ci
          cd frontend && npm ci

      - name: Create node_modules symlink for quick-check
        run: |
          # Create a symlink so quick-check can find modules
          ln -sf node_modules frontend/node_modules-root

      - name: Verify React modules exist
        run: |
          echo "Checking React modules..."
          ls node_modules | grep react || echo "React not found in root"
          ls frontend/node_modules | grep react || echo "React not found in frontend"
