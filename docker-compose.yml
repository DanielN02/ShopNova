version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: shopnova-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-shopnova}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-dev-password}
      POSTGRES_DB: ${DB_NAME:-shopnova}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shopnova"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - shopnova-network

  mongodb:
    image: mongo:7
    container_name: shopnova-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${DB_USER:-shopnova}
      MONGO_INITDB_ROOT_PASSWORD: ${DB_PASSWORD:-dev-password}
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - shopnova-network

  redis:
    image: redis:7-alpine
    container_name: shopnova-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - shopnova-network

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: shopnova-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - shopnova-network

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: shopnova-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - shopnova-network

  user-service:
    build:
      context: ./services/user-service
      dockerfile: Dockerfile
    container_name: shopnova-user-service
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      PORT: "3001"
      DATABASE_URL: postgres://${DB_USER:-shopnova}:${DB_PASSWORD:-dev-password}@postgres:5432/${DB_NAME:-shopnova}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-key-change-in-production}
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - shopnova-network

  product-service:
    build:
      context: ./services/product-service
      dockerfile: Dockerfile
    container_name: shopnova-product-service
    ports:
      - "3002:3002"
    environment:
      NODE_ENV: production
      PORT: "3002"
      MONGODB_URI: mongodb://${DB_USER:-shopnova}:${DB_PASSWORD:-dev-password}@mongodb:27017/shopnova?authSource=admin
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      ELASTICSEARCH_URL: ${ELASTICSEARCH_URL:-http://elasticsearch:9200}
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672
      JWT_SECRET: ${JWT_SECRET:-dev-secret-key-change-in-production}
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3002/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - shopnova-network

  order-service:
    build:
      context: ./services/order-service
      dockerfile: Dockerfile
    container_name: shopnova-order-service
    ports:
      - "3003:3003"
    environment:
      NODE_ENV: production
      PORT: "3003"
      DATABASE_URL: postgres://${DB_USER:-shopnova}:${DB_PASSWORD:-dev-password}@postgres:5432/${DB_NAME:-shopnova}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672
      JWT_SECRET: ${JWT_SECRET:-dev-secret-key-change-in-production}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3003/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - shopnova-network

  notification-service:
    build:
      context: ./services/notification-service
      dockerfile: Dockerfile
    container_name: shopnova-notification-service
    ports:
      - "3004:3004"
    environment:
      NODE_ENV: production
      PORT: "3004"
      MONGODB_URI: mongodb://${DB_USER:-shopnova}:${DB_PASSWORD:-dev-password}@mongodb:27017/shopnova?authSource=admin
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672
      JWT_SECRET: ${JWT_SECRET:-dev-secret-key-change-in-production}
      SMTP_HOST: ${SMTP_HOST:-smtp.mailtrap.io}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3004/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - shopnova-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: shopnova-frontend
    ports:
      - "80:80"
    depends_on:
      user-service:
        condition: service_healthy
      product-service:
        condition: service_healthy
      order-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - shopnova-network

volumes:
  postgres_data:
  mongodb_data:
  redis_data:
  elasticsearch_data:
  rabbitmq_data:

networks:
  shopnova-network:
    driver: bridge
