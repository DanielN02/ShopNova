version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: shopnova-postgres
    environment:
      POSTGRES_USER: shopnova
      POSTGRES_PASSWORD: shopnova123
      POSTGRES_DB: shopnova
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql

  mongodb:
    image: mongo:7
    container_name: shopnova-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: shopnova
      MONGO_INITDB_ROOT_PASSWORD: shopnova123
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  redis:
    image: redis:7-alpine
    container_name: shopnova-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: shopnova-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: shopnova-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: shopnova
      RABBITMQ_DEFAULT_PASS: shopnova123
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

volumes:
  postgres_data:
  mongodb_data:
  redis_data:
  elasticsearch_data:
  rabbitmq_data:
